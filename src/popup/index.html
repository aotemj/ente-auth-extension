<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthVault</title>
    <style>
        body {
            width: 360px;
            min-height: 400px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
        }
        /* Inline loading screen - shows instantly before JS loads */
        #initial-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: 16px;
        }
        #initial-loading .logo {
            animation: pulse 1.5s ease-in-out infinite;
        }
        #initial-loading .text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Inline loading shown instantly; React will replace #root content on mount -->
        <div id="initial-loading">
            <svg class="logo" width="40" height="40" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L3 7V12C3 16.97 6.84 21.66 12 23C17.16 21.66 21 16.97 21 12V7L12 2Z" fill="#059669"/>
                <path d="M10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z" fill="white"/>
            </svg>
            <div class="text">Loading...</div>
        </div>
    </div>
</body>
</html>
