<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- QR finder patterns -->
  <rect x="22" y="22" width="26" height="26" rx="4" fill="#ffffff"/>
  <rect x="25" y="25" width="20" height="20" rx="3" fill="url(#bg)"/>
  <rect x="29" y="29" width="12" height="12" rx="1.5" fill="#ffffff"/>
  
  <rect x="80" y="22" width="26" height="26" rx="4" fill="#ffffff"/>
  <rect x="83" y="25" width="20" height="20" rx="3" fill="url(#bg)"/>
  <rect x="87" y="29" width="12" height="12" rx="1.5" fill="#ffffff"/>
  
  <rect x="22" y="80" width="26" height="26" rx="4" fill="#ffffff"/>
  <rect x="25" y="83" width="20" height="20" rx="3" fill="url(#bg)"/>
  <rect x="29" y="87" width="12" height="12" rx="1.5" fill="#ffffff"/>
  
  <!-- More data pixels - top row between finders -->
  <rect x="54" y="24" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="62" y="24" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="70" y="24" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="54" y="32" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="62" y="32" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="54" y="40" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  
  <!-- Left column between finders -->
  <rect x="24" y="54" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="32" y="54" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="24" y="62" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="32" y="62" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="40" y="54" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="24" y="70" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="32" y="70" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Center area data -->
  <rect x="54" y="54" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="62" y="54" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="54" y="62" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="62" y="62" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="70" y="54" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="54" y="70" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  <rect x="40" y="62" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="48" y="70" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Right column -->
  <rect x="96" y="54" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="96" y="62" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="88" y="54" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Bottom row -->
  <rect x="54" y="96" width="5" height="5" fill="#ffffff" opacity="0.6"/>
  <rect x="62" y="96" width="5" height="5" fill="#ffffff" opacity="0.7"/>
  <rect x="54" y="88" width="5" height="5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Clock badge in bottom-right with border gap - same size as QR finder (26x26) -->
  <!-- Background ring as border -->
  <circle cx="93" cy="93" r="17" fill="url(#bg)"/>
  <circle cx="93" cy="93" r="14" fill="#ffffff"/>
  <!-- Clock face -->
  <circle cx="93" cy="93" r="10" fill="none" stroke="#059669" stroke-width="2.5"/>
  <!-- Clock hands -->
  <line x1="93" y1="93" x2="93" y2="86" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <line x1="93" y1="93" x2="98" y2="95" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="93" cy="93" r="1.5" fill="#059669"/>
</svg>
