<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- QR finder patterns - thick borders, tight -->
  <rect x="4" y="4" width="40" height="40" fill="#059669"/>
  <rect x="10" y="10" width="28" height="28" fill="#ffffff"/>
  <rect x="16" y="16" width="16" height="16" fill="#059669"/>

  <rect x="84" y="4" width="40" height="40" fill="#059669"/>
  <rect x="90" y="10" width="28" height="28" fill="#ffffff"/>
  <rect x="96" y="16" width="16" height="16" fill="#059669"/>

  <rect x="4" y="84" width="40" height="40" fill="#059669"/>
  <rect x="10" y="90" width="28" height="28" fill="#ffffff"/>
  <rect x="16" y="96" width="16" height="16" fill="#059669"/>

  <!-- Timing patterns (lines between finders) -->
  <rect x="48" y="16" width="8" height="8" fill="#059669"/>
  <rect x="64" y="16" width="8" height="8" fill="#059669"/>
  <rect x="16" y="48" width="8" height="8" fill="#059669"/>
  <rect x="16" y="64" width="8" height="8" fill="#059669"/>

  <!-- Data modules - compact grid -->
  <rect x="48" y="4" width="8" height="8" fill="#059669"/>
  <rect x="64" y="4" width="8" height="8" fill="#059669"/>
  <rect x="48" y="28" width="8" height="8" fill="#059669"/>
  <rect x="64" y="28" width="8" height="8" fill="#059669"/>
  <rect x="76" y="28" width="6" height="6" fill="#059669" opacity="0.8"/>

  <rect x="4" y="48" width="8" height="8" fill="#059669"/>
  <rect x="28" y="48" width="8" height="8" fill="#059669"/>
  <rect x="4" y="64" width="8" height="8" fill="#059669"/>
  <rect x="28" y="64" width="8" height="8" fill="#059669"/>
  <rect x="28" y="76" width="6" height="6" fill="#059669" opacity="0.8"/>

  <rect x="48" y="48" width="8" height="8" fill="#059669"/>
  <rect x="60" y="48" width="8" height="8" fill="#059669"/>
  <rect x="72" y="48" width="8" height="8" fill="#059669"/>
  <rect x="48" y="60" width="8" height="8" fill="#059669"/>
  <rect x="60" y="60" width="8" height="8" fill="#059669"/>
  <rect x="72" y="60" width="8" height="8" fill="#059669"/>
  <rect x="48" y="72" width="8" height="8" fill="#059669"/>
  <rect x="60" y="72" width="8" height="8" fill="#059669"/>

  <rect x="48" y="96" width="8" height="8" fill="#059669"/>
  <rect x="48" y="108" width="8" height="8" fill="#059669" opacity="0.8"/>
  <rect x="60" y="96" width="8" height="8" fill="#059669" opacity="0.8"/>

  <rect x="96" y="48" width="8" height="8" fill="#059669"/>
  <rect x="108" y="48" width="8" height="8" fill="#059669" opacity="0.8"/>
  <rect x="96" y="60" width="8" height="8" fill="#059669" opacity="0.8"/>

  <!-- Clock badge in bottom-right -->
  <circle cx="100" cy="100" r="22" fill="#ffffff"/>
  <circle cx="100" cy="100" r="18" fill="#059669"/>
  <circle cx="100" cy="100" r="13" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="100" y2="92" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="107" y2="103" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="2" fill="#ffffff"/>
</svg>
