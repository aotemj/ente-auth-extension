  <line x1="64" y1="86" x2="64" y2="93" stroke="#fff" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="76" y1="86" x2="76" y2="96" stroke="#fff" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
