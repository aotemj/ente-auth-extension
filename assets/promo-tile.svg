<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065F46"/>
      <stop offset="100%" style="stop-color:#064E3B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <!-- QR+Clock icon scaled to ~80px, centered left -->
  <g transform="translate(110, 100)">
    <!-- QR finder patterns -->
    <rect x="0" y="0" width="24" height="24" fill="#059669"/>
    <rect x="4" y="4" width="16" height="16" fill="#ffffff"/>
    <rect x="8" y="8" width="8" height="8" fill="#059669"/>

    <rect x="52" y="0" width="24" height="24" fill="#059669"/>
    <rect x="56" y="4" width="16" height="16" fill="#ffffff"/>
    <rect x="60" y="8" width="8" height="8" fill="#059669"/>

    <rect x="0" y="52" width="24" height="24" fill="#059669"/>
    <rect x="4" y="56" width="16" height="16" fill="#ffffff"/>
    <rect x="8" y="60" width="8" height="8" fill="#059669"/>

    <!-- Data pixels -->
    <rect x="28" y="4" width="5" height="5" fill="#059669"/>
    <rect x="38" y="4" width="5" height="5" fill="#059669"/>
    <rect x="28" y="14" width="5" height="5" fill="#059669"/>
    <rect x="4" y="28" width="5" height="5" fill="#059669"/>
    <rect x="14" y="28" width="5" height="5" fill="#059669"/>
    <rect x="4" y="38" width="5" height="5" fill="#059669"/>
    <rect x="28" y="28" width="5" height="5" fill="#059669"/>
    <rect x="38" y="28" width="5" height="5" fill="#059669"/>
    <rect x="28" y="38" width="5" height="5" fill="#059669"/>
    <rect x="38" y="38" width="5" height="5" fill="#059669"/>

    <!-- Clock -->
    <circle cx="62" cy="62" r="14" fill="#ffffff"/>
    <circle cx="62" cy="62" r="11" fill="#059669"/>
    <circle cx="62" cy="62" r="8" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="62" y1="62" x2="62" y2="56" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="62" x2="67" y2="64" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="62" cy="62" r="1.2" fill="#ffffff"/>
  </g>
  <!-- Text -->
  <text x="230" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="start">AuthVault 2FA</text>
  <text x="230" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="start">OTP Autofill for Ente Auth</text>
</svg>
