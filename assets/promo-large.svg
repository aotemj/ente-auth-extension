  <text x="700" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="700" fill="#ffffff" text-anchor="start">AuthVault 2FA</text>
  <text x="700" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="start">OTP Autofill for Ente Auth</text>
  <text x="700" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="start">Secure 2FA autofill directly in your browser</text>
