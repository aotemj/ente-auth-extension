      <stop offset="0%" style="stop-color:#065F46"/>
      <stop offset="100%" style="stop-color:#064E3B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>
  <!-- QR+Clock icon scaled to ~160px -->
