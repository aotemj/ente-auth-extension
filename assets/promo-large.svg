    <rect x="126" y="16" width="18" height="18" fill="#059669"/>

    <rect x="0" y="110" width="50" height="50" fill="#059669"/>
    <rect x="8" y="118" width="34" height="34" fill="#ffffff"/>
    <rect x="16" y="126" width="18" height="18" fill="#059669"/>

    <!-- Data pixels -->
    <rect x="58" y="8" width="10" height="10" fill="#059669"/>
    <rect x="78" y="8" width="10" height="10" fill="#059669"/>
    <rect x="58" y="28" width="10" height="10" fill="#059669"/>
    <rect x="78" y="28" width="10" height="10" fill="#059669"/>
    <rect x="8" y="58" width="10" height="10" fill="#059669"/>
    <rect x="28" y="58" width="10" height="10" fill="#059669"/>
    <rect x="8" y="78" width="10" height="10" fill="#059669"/>
    <rect x="28" y="78" width="10" height="10" fill="#059669"/>
    <rect x="58" y="58" width="10" height="10" fill="#059669"/>
    <rect x="78" y="58" width="10" height="10" fill="#059669"/>
    <rect x="58" y="78" width="10" height="10" fill="#059669"/>
    <rect x="78" y="78" width="10" height="10" fill="#059669"/>
    <rect x="98" y="58" width="10" height="10" fill="#059669" opacity="0.7"/>
    <rect x="58" y="98" width="10" height="10" fill="#059669" opacity="0.7"/>

    <!-- Clock -->
    <circle cx="130" cy="130" r="28" fill="#ffffff"/>
    <circle cx="130" cy="130" r="22" fill="#059669"/>
    <circle cx="130" cy="130" r="16" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="130" y1="130" x2="130" y2="119" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="130" y1="130" x2="140" y2="133" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
